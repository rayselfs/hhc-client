name: Deploy Website

on:
  push:
    branches: [main]
    paths:
      - 'src/renderer/**'
      - 'src/shared/**'
      - 'package.json'
      - 'package-lock.json'
      - 'electron.vite.config.ts'
      - 'staticwebapp.config.json'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build renderer
        run: npx electron-vite build

      - name: Copy SPA config
        run: cp staticwebapp.config.json out/renderer/

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: out/renderer
          skip_app_build: true
          skip_api_build: true
